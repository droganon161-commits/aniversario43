<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>43° Aniversario Drogadictos Anónimos</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#1f3c88,#0f1f4d);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
color:#FFD000;
margin-top:20px;
}

/* BARRA */

.barra{
width:80%;
height:35px;
background:rgba(255,255,255,0.2);
border-radius:30px;
margin:auto;
margin-top:20px;
overflow:hidden;
}

.barra-progreso{
height:100%;
background:#ffd000;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-weight:bold;
width:0%;
}

/* CONTADOR */

.contador{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
}

.caja{
background:rgba(20,30,60,0.9);
padding:20px;
border-radius:18px;
width:110px;
box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

.numero{
font-size:34px;
color:#FFD000;
font-weight:bold;
}

.texto{
font-size:12px;
margin-top:5px;
}

/* CLIMA IZQUIERDA */

.clima-panel{

position:absolute;

left:30px;
top:360px;

width:240px;

background:linear-gradient(180deg,#2c7bff,#0f2c66);

border-radius:20px;

padding:20px;

box-shadow:0 20px 40px rgba(0,0,0,0.6);

}

.clima-panel h3{
margin:0;
}

.clima-temp{
font-size:50px;
font-weight:bold;
}

.clima-extra{
opacity:0.8;
}

/* INFO */

.info{
margin-top:30px;
font-size:18px;
}

/* CARRUSEL */

.carrusel{
width:70%;
margin:auto;
margin-top:40px;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.carrusel img{
width:100%;
height:340px;
object-fit:cover;
}

/* PARTICULAS */

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* VIDEO */

#videoOverlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:none;

justify-content:center;
align-items:center;

z-index:9999;

}

#videoOverlay video{

width:100%;
height:100%;
object-fit:cover;

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>📅 43° Aniversario Drogadictos Anónimos AC</h1>

<div class="barra">
<div class="barra-progreso" id="barraTexto">Cargando...</div>
</div>

<div class="contador">

<div class="caja"><div class="numero" id="anios">0</div><div class="texto">AÑOS</div></div>

<div class="caja"><div class="numero" id="meses">0</div><div class="texto">MESES</div></div>

<div class="caja"><div class="numero" id="dias">0</div><div class="texto">DÍAS</div></div>

<div class="caja"><div class="numero" id="horas">0</div><div class="texto">HORAS</div></div>

<div class="caja"><div class="numero" id="minutos">0</div><div class="texto">MIN</div></div>

<div class="caja"><div class="numero" id="segundos">0</div><div class="texto">SEG</div></div>

</div>

<div class="info">

<span id="saludo"></span>  
⏰ <span id="hora"></span>

</div>

<!-- CLIMA -->

<div class="clima-panel">

<h3>📍 Santa Cruz Palomeque</h3>

<div class="clima-temp" id="tempPanel">--°</div>

<div id="estadoClima">Cargando clima...</div>

<div class="clima-extra" id="vientoPanel"></div>

</div>

<!-- CARRUSEL -->

<div class="carrusel">

<img id="slide" src="foto1.jpg">

</div>

<!-- VIDEO -->

<div id="videoOverlay">

<video id="videoEvento" autoplay muted></video>

</div>

<script>

/* CONTADOR CORRECTO */

const fechaEvento = new Date("November 7, 2026 00:00:00");

function actualizarContador(){

let ahora = new Date();

let evento = new Date(fechaEvento);

let años = evento.getFullYear() - ahora.getFullYear();
let meses = evento.getMonth() - ahora.getMonth();
let dias = evento.getDate() - ahora.getDate();

if(dias < 0){

meses--;

let ultimoMes = new Date(ahora.getFullYear(), ahora.getMonth()+1,0);

dias += ultimoMes.getDate();

}

if(meses < 0){

años--;

meses += 12;

}

let diferencia = evento - ahora;

let horas = Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

let minutos = Math.floor((diferencia%(1000*60*60))/(1000*60));

let segundos = Math.floor((diferencia%(1000*60))/1000);

document.getElementById("anios").innerText = años;
document.getElementById("meses").innerText = meses;
document.getElementById("dias").innerText = dias;
document.getElementById("horas").innerText = horas;
document.getElementById("minutos").innerText = minutos;
document.getElementById("segundos").innerText = segundos;

/* barra progreso */

let totalDias = 365;

let diasRestantes = Math.floor(diferencia/(1000*60*60*24));

let progreso = ((totalDias-diasRestantes)/totalDias)*100;

document.getElementById("barraTexto").style.width = progreso+"%";

document.getElementById("barraTexto").innerText = "Faltan "+diasRestantes+" días";

}

setInterval(actualizarContador,1000);

/* RELOJ */

function reloj(){

let ahora = new Date();

let h = ahora.getHours();

let saludo = "Buenas noches";

if(h < 12) saludo = "Buenos días";

else if(h < 19) saludo = "Buenas tardes";

document.getElementById("saludo").innerText = saludo;

document.getElementById("hora").innerText = ahora.toLocaleTimeString();

}

setInterval(reloj,1000);

/* CLIMA */

async function clima(){

let url="https://api.open-meteo.com/v1/forecast?latitude=20.99&longitude=-89.62&current_weather=true";

let r = await fetch(url);

let data = await r.json();

let temp = data.current_weather.temperature;

let viento = data.current_weather.windspeed;

document.getElementById("tempPanel").innerText = temp+"°C";

document.getElementById("vientoPanel").innerText = "💨 "+viento+" km/h";

document.getElementById("estadoClima").innerText = "Clima actual";

}

clima();

setInterval(clima,300000);

/* CARRUSEL */

let fotos=[
"fotos/foto1.jpg",
"fotos/foto2.jpg",
"fotos/foto3.jpg",
"fotos/foto4.jpg"];

let i=0;

setInterval(()=>{

i++;

if(i>=fotos.length) i=0;

document.getElementById("slide").src=fotos[i];

},4000);

/* PARTICULAS */

const canvas=document.getElementById("particles");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3,
speed:Math.random()*0.5

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.fillStyle="rgba(255,255,255,0.6)";

ctx.beginPath();

ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

ctx.fill();

p.y+=p.speed;

if(p.y>canvas.height)p.y=0;

});

requestAnimationFrame(draw);

}

draw();

/* VIDEO CADA 5 MIN */

setInterval(()=>{

let overlay=document.getElementById("videoOverlay");

let video=document.getElementById("videoEvento");

overlay.style.display="flex";

video.src="video.mp4";

video.play();

video.onended=()=>{

overlay.style.display="none";

}

},300000);

</script>

</body>

</html>
