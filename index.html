<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>43° Aniversario Drogadictos Anónimos</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:linear-gradient(180deg,#1f3c88,#0f1f4d);
color:white;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin-top:10px;
color:#FFD000;
}

/* BARRA */

.barra{
width:70%;
height:25px;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.barra-progreso{
height:100%;
background:#FFD000;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-weight:bold;
font-size:12px;
width:0%;
}

/* CONTADOR */

.contador{
display:flex;
gap:10px;
margin-top:10px;
}

.caja{
background:rgba(20,30,60,0.9);
padding:10px;
border-radius:14px;
width:80px;
text-align:center;
}

.numero{
font-size:24px;
color:#FFD000;
font-weight:bold;
}

.texto{
font-size:10px;
}

/* INFO */

.info{
margin-top:5px;
font-size:14px;
}

/* CLIMA */

.clima-panel{

position:absolute;
left:20px;
top:220px;

width:200px;

background:linear-gradient(180deg,#2c7bff,#0f2c66);

border-radius:16px;

padding:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.6);

}

/* CARRUSEL */

.carrusel{

width:60%;
margin-top:10px;
border-radius:20px;
overflow:hidden;

}

.carrusel img{

width:100%;
height:220px;
object-fit:cover;

}

/* VERSICULO */

.versiculo-box{

width:60%;
margin-top:8px;

background:rgba(20,30,60,0.9);

padding:10px;

border-radius:14px;

font-size:14px;

text-align:center;

animation:respirar 6s ease-in-out infinite;

}

@keyframes respirar{

0%{transform:scale(1)}
50%{transform:scale(1.02)}
100%{transform:scale(1)}

}

/* VIDEO */

#videoOverlay{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:black;

display:none;
justify-content:center;
align-items:center;

z-index:9999;

}

#videoOverlay video{

width:100%;
height:100%;
object-fit:cover;

}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

</style>
</head>

<body>

<div id="tsparticles"></div>

<h1>43° Aniversario Drogadictos Anónimos AC</h1>

<div class="barra">
<div class="barra-progreso" id="barraProgreso"></div>
</div>

<div class="contador">

<div class="caja"><div id="años" class="numero">0</div><div class="texto">AÑOS</div></div>
<div class="caja"><div id="meses" class="numero">0</div><div class="texto">MESES</div></div>
<div class="caja"><div id="dias" class="numero">0</div><div class="texto">DÍAS</div></div>
<div class="caja"><div id="horas" class="numero">0</div><div class="texto">HORAS</div></div>
<div class="caja"><div id="minutos" class="numero">0</div><div class="texto">MIN</div></div>
<div class="caja"><div id="segundos" class="numero">0</div><div class="texto">SEG</div></div>

</div>

<div class="info" id="saludo"></div>
<div class="info" id="hora"></div>

<div class="clima-panel">

<div id="climaTemp">--°C</div>
<div id="climaEstado"></div>
<div id="climaViento"></div>

</div>

<div class="carrusel">

<img id="slide" src="fotos/foto1.jpg">

</div>

<div class="versiculo-box">

📖 <span id="versiculoTexto"></span>

</div>

<div id="videoOverlay">
<video id="videoEvento" autoplay muted></video>
</div>

<script>

/* CONTADOR */

const fechaEvento = new Date("November 7, 2026 00:00:00");

function actualizarContador(){

let ahora=new Date()

let diff=fechaEvento-ahora

let diasTotales=Math.floor(diff/(1000*60*60*24))

let años=Math.floor(diasTotales/365)
let meses=Math.floor((diasTotales%365)/30)
let dias=(diasTotales%365)%30

let horas=Math.floor((diff%(1000*60*60*24))/(1000*60*60))
let minutos=Math.floor((diff%(1000*60*60))/(1000*60))
let segundos=Math.floor((diff%(1000*60))/1000)

document.getElementById("años").innerText=años
document.getElementById("meses").innerText=meses
document.getElementById("dias").innerText=dias
document.getElementById("horas").innerText=horas
document.getElementById("minutos").innerText=minutos
document.getElementById("segundos").innerText=segundos

let progreso=((365-diasTotales)/365)*100

document.getElementById("barraProgreso").style.width=progreso+"%"

}

setInterval(actualizarContador,1000)

/* HORA Y SALUDO */

function reloj(){

let ahora=new Date()

let h=ahora.getHours()
let m=ahora.getMinutes()

document.getElementById("hora").innerText="Hora actual: "+h+":"+m

let saludo="Buenas noches"

if(h>=6 && h<12)saludo="Buenos días"
if(h>=12 && h<19)saludo="Buenas tardes"

document.getElementById("saludo").innerText=saludo

}

setInterval(reloj,1000)

/* CARRUSEL */

let fotos=[
"fotos/foto1.jpg",
"fotos/foto2.jpg",
"fotos/foto3.jpg",
"fotos/foto4.jpg"
]

let index=0

setInterval(()=>{

index++

if(index>=fotos.length)index=0

document.getElementById("slide").src=fotos[index]

},4000)

/* VIDEO CADA 5 MIN */

setInterval(()=>{

let overlay=document.getElementById("videoOverlay")

let video=document.getElementById("videoEvento")

video.src="fotos/video.mp4"

overlay.style.display="flex"

video.play()

setTimeout(()=>{

overlay.style.display="none"

video.pause()

},20000)

},300000)

/* VERSICULO */

const versiculos=[

"Todo lo puedo en aquel que me fortalece — Filipenses 4:13",
"El Señor es mi pastor nada me faltará — Salmos 23:1",
"Dios es nuestro amparo y fortaleza — Salmos 46:1",
"Confía en el Señor con todo tu corazón — Proverbios 3:5",
"La paz os dejo mi paz os doy — Juan 14:27",
"Sean fuertes y valientes — Josué 1:9",
"Busquen primero el reino de Dios — Mateo 6:33"

]

let hoy=new Date()

let indice=(hoy.getFullYear()+hoy.getMonth()+hoy.getDate())%versiculos.length

document.getElementById("versiculoTexto").innerText=versiculos[indice]

/* CLIMA */

async function clima(){

let r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=20.97&longitude=-89.62&current_weather=true")

let data=await r.json()

let temp=data.current_weather.temperature
let viento=data.current_weather.windspeed
let codigo=data.current_weather.weathercode

document.getElementById("climaTemp").innerText=temp+"°C"
document.getElementById("climaViento").innerText="Viento "+viento+" km/h"

let estado="Soleado"

if(codigo>2)estado="Nublado"

document.getElementById("climaEstado").innerText=estado

particulas(codigo,viento)

}

clima()

/* PARTICULAS SEGUN CLIMA */

function particulas(codigo,viento){

let color=["#FFD000"]
let speed=1

if(codigo>2)color=["#bfbfbf","#d6d6d6"]

if(viento>20){
color=["#5dade2","#3498db"]
speed=4
}

tsParticles.load("tsparticles",{

fpsLimit:60,

particles:{
number:{value:120},
color:{value:color},
shape:{type:"circle"},
size:{value:{min:1,max:4}},
move:{
enable:true,
speed:speed
}
}

})

}

</script>

</body>
</html>
