<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>43° Aniversario Drogadictos Anónimos AC</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(#1c3c84,#0d224d);
color:white;
overflow-x:hidden;
}

#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

h1{
text-align:center;
font-size:50px;
color:#ffd000;
margin-top:20px;
}

.progreso{
width:80%;
margin:auto;
height:45px;
background:rgba(255,255,255,0.2);
border-radius:30px;
overflow:hidden;
}

.barra{
height:100%;
width:35%;
background:#ffc400;
display:flex;
align-items:center;
justify-content:center;
color:black;
font-weight:bold;
}

.contador{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
}

.caja{
background:#132b59;
padding:30px;
border-radius:20px;
text-align:center;
width:110px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.numero{
font-size:40px;
color:#ffd000;
}

.climaBox{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
font-size:22px;
align-items:center;
}

.cardClima{

background:linear-gradient(180deg,#2c72ff,#0f2c66);
padding:20px;
border-radius:25px;
width:300px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
text-align:center;
}

.temp{
font-size:55px;
font-weight:bold;
}

.videoFull{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div id="tsparticles"></div>

<h1>📅 43° Aniversario Drogadictos Anónimos AC</h1>

<div class="progreso">
<div class="barra">Faltan 246 días</div>
</div>

<div class="contador">

<div class="caja">
<div class="numero" id="anios">0</div>
AÑOS
</div>

<div class="caja">
<div class="numero" id="meses">0</div>
MESES
</div>

<div class="caja">
<div class="numero" id="dias">0</div>
DÍAS
</div>

<div class="caja">
<div class="numero" id="horas">0</div>
HORAS
</div>

<div class="caja">
<div class="numero" id="minutos">0</div>
MINUTOS
</div>

<div class="caja">
<div class="numero" id="segundos">0</div>
SEGUNDOS
</div>

</div>


<div class="climaBox">

<div id="saludo"></div>

<div id="hora"></div>

<div class="cardClima">

<div id="ciudad">Santa Cruz Palomeque Mérida</div>

<div class="temp" id="temp">--°</div>

<div id="estado"></div>

<div id="viento"></div>

</div>

</div>


<div class="videoFull" id="videoPantalla">

<video id="videoEvento" autoplay muted loop>

<source src="video.mp4" type="video/mp4">

</video>

</div>



<script>

const evento = new Date("May 27, 2026 00:00:00")

function contador(){

const ahora = new Date()

const diferencia = evento - ahora

let segundos = Math.floor(diferencia/1000)%60
let minutos = Math.floor(diferencia/1000/60)%60
let horas = Math.floor(diferencia/1000/60/60)%24
let dias = Math.floor(diferencia/1000/60/60/24)%30
let meses = Math.floor(diferencia/1000/60/60/24/30)%12
let anios = Math.floor(diferencia/1000/60/60/24/365)

document.getElementById("anios").innerText = anios
document.getElementById("meses").innerText = meses
document.getElementById("dias").innerText = dias
document.getElementById("horas").innerText = horas
document.getElementById("minutos").innerText = minutos
document.getElementById("segundos").innerText = segundos

}

setInterval(contador,1000)

function reloj(){

let ahora = new Date()

document.getElementById("hora").innerText = "🕒 "+ahora.toLocaleTimeString()

}

setInterval(reloj,1000)

function saludo(){

let h = new Date().getHours()

let s="Buenas noches"

if(h<12)s="Buenos días"
else if(h<19)s="Buenas tardes"

document.getElementById("saludo").innerText="☁ "+s

}

saludo()



async function clima(){

let url="https://api.open-meteo.com/v1/forecast?latitude=20.99&longitude=-89.62&current_weather=true"

let r=await fetch(url)

let data=await r.json()

let temp=data.current_weather.temperature

let viento=data.current_weather.windspeed

let codigo=data.current_weather.weathercode

document.getElementById("temp").innerText=temp+"°C"

document.getElementById("viento").innerText="💨 "+viento+" km/h"

let estado="Despejado"

if(codigo>2)estado="Nublado"

document.getElementById("estado").innerText=estado

particulas(estado,viento)

}

clima()

setInterval(clima,300000)



function particulas(clima,viento){

let color="#ffd000"

let speed=1

if(clima=="Nublado")color="#cccccc"

if(viento>20){

color="#66aaff"
speed=5

}

tsParticles.load("tsparticles",{

particles:{

number:{value:80},

color:{value:color},

move:{speed:speed},

size:{value:3}

}

})

}



setInterval(()=>{

document.getElementById("videoPantalla").style.display="block"

setTimeout(()=>{

document.getElementById("videoPantalla").style.display="none"

},20000)

},300000)



</script>

</body>
</html>
