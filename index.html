<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>43° Aniversario Drogadictos Anónimos AC</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#1f3c88,#0f1f4d);
    color:white;
    overflow-x:hidden;
}

#tsparticles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.main{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:25px 15px;
    text-align:center;
}

h1{
    font-size:26px;
    color:#ffcc00;
    margin-bottom:20px;
}

/* ===== INFO SUPERIOR ===== */

.info-top{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:20px;
}

.info-box{
    background:rgba(20,30,60,0.9);
    padding:10px 18px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
    font-size:14px;
}

/* ===== BARRA ===== */

.barra-contenedor{
    width:95%;
    height:32px;
    background:rgba(255,255,255,0.2);
    border-radius:25px;
    overflow:hidden;
    margin-bottom:30px;
}

.barra-progreso{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ffd000,#ffae00,#ffcc00);
    border-radius:25px;
    transition:width 1s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#1f1f1f;
    padding:0 8px;
    font-size:12px;
    white-space:nowrap;
}

/* ===== CONTADOR ===== */

.contenedor{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}

.caja{
    background:rgba(20,30,60,0.9);
    padding:18px 15px;
    border-radius:18px;
    width:90px;
    box-shadow:0 15px 35px rgba(0,0,0,0.6);
    backdrop-filter:blur(6px);
}

.numero{
    font-size:24px;
    font-weight:bold;
    color:#ffcc00;
    transition:transform 0.3s ease, opacity 0.3s ease;
}

.numero.animar{
    transform:scale(1.3);
    opacity:0.5;
}

.texto{
    font-size:12px;
    margin-top:5px;
}

/* ===== CARRUSEL ===== */

.carrusel{
    position:relative;
    width:95%;
    height:40vh;
    overflow:hidden;
    border-radius:20px;
    margin-bottom:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 1.5s ease-in-out;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.activo{opacity:1;}

.mensaje-final{
    padding:15px;
    border:2px solid #ffcc00;
    border-radius:20px;
    background:rgba(20,30,60,0.7);
}

@media(min-width:768px){
h1{font-size:40px;}
.numero{font-size:30px;}
.caja{width:110px;}
}
</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="main">

<h1>📅 43° Aniversario Drogadictos Anónimos AC</h1>

<!-- HORA Y CLIMA -->
<div class="info-top">
    <div class="info-box" id="horaActual">🕒 --:--:--</div>
    <div class="info-box" id="climaActual">🌤 Cargando clima...</div>
</div>

<div class="barra-contenedor">
    <div class="barra-progreso" id="barraProgreso">
        <span id="textoBarra"></span>
    </div>
</div>

<div class="contenedor">
    <div class="caja"><div class="numero" id="anios">0</div><div class="texto">AÑOS</div></div>
    <div class="caja"><div class="numero" id="meses">0</div><div class="texto">MESES</div></div>
    <div class="caja"><div class="numero" id="dias">0</div><div class="texto">DÍAS</div></div>
    <div class="caja"><div class="numero" id="horas">0</div><div class="texto">HORAS</div></div>
    <div class="caja"><div class="numero" id="minutos">0</div><div class="texto">MINUTOS</div></div>
    <div class="caja"><div class="numero" id="segundos">0</div><div class="texto">SEGUNDOS</div></div>
</div>

<div class="carrusel" id="carrusel"></div>

</div>

<script>

const fechaEvento = new Date("2026-11-07T00:00:00");
const totalDias = 365;

function animarCambio(id, nuevoValor){
    const el = document.getElementById(id);
    if(el.innerText != nuevoValor){
        el.classList.add("animar");
        setTimeout(()=>{
            el.innerText = nuevoValor;
            el.classList.remove("animar");
        },150);
    }
}

function actualizar(){
    const ahora = new Date();
    let diff = fechaEvento - ahora;

    if(diff <= 0){
        document.getElementById("textoBarra").innerText="🎉 ¡Hoy es el Evento!";
        return;
    }

    let segundos = Math.floor(diff/1000)%60;
    let minutos = Math.floor(diff/(1000*60))%60;
    let horas = Math.floor(diff/(1000*60*60))%24;
    let totalDiasRestantes = Math.floor(diff/(1000*60*60*24));

    let anios = Math.floor(totalDiasRestantes/365);
    let meses = Math.floor((totalDiasRestantes%365)/30);
    let dias = (totalDiasRestantes%365)%30;

    animarCambio("anios",anios);
    animarCambio("meses",meses);
    animarCambio("dias",dias);
    animarCambio("horas",horas);
    animarCambio("minutos",minutos);
    animarCambio("segundos",segundos);

    let progreso=((totalDias-totalDiasRestantes)/totalDias)*100;
    if(progreso<0)progreso=0;
    if(progreso>100)progreso=100;

    document.getElementById("barraProgreso").style.width=progreso+"%";
    document.getElementById("textoBarra").innerText=`Faltan ${totalDiasRestantes} días`;
}

setInterval(actualizar,1000);
actualizar();

/* HORA ACTUAL */
setInterval(()=>{
    const ahora=new Date();
    document.getElementById("horaActual").innerText=
        "🕒 "+ahora.toLocaleTimeString();
},1000);

/* CLIMA */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
.then(res=>res.json())
.then(data=>{
let temp=data.current_weather.temperature;
let viento=data.current_weather.windspeed;
document.getElementById("climaActual").innerText=
`🌡 ${temp}°C | 💨 ${viento} km/h`;
});
});
}

/* CARRUSEL */
const imagenes=[];
for(let i=1;i<=8;i++){imagenes.push(`foto${i}.jpg`);}
const carrusel=document.getElementById("carrusel");

imagenes.forEach((nombre,index)=>{
let div=document.createElement("div");
div.classList.add("slide");
if(index===0)div.classList.add("activo");
let img=document.createElement("img");
img.src="fotos/"+nombre;
div.appendChild(img);
carrusel.appendChild(div);
});

setInterval(()=>{
let slides=document.querySelectorAll(".slide");
let actual=document.querySelector(".slide.activo");
let index=Array.from(slides).indexOf(actual);
actual.classList.remove("activo");
slides[(index+1)%slides.length].classList.add("activo");
},4000);

/* PARTICULAS */
tsParticles.load("tsparticles",{
particles:{
number:{value:120},
color:{value:["#ff6a00","#ffd000","#ffffff"]},
move:{enable:true,speed:1,direction:"top"}
}
});

</script>

</body>
</html>
