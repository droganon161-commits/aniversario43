<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>47° Aniversario Drogadictos Anónimos</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
overflow:hidden;

background:linear-gradient(180deg,#1f3c88,#0f1f4d);

color:white;

display:flex;
flex-direction:column;
align-items:center;

}

/* PARTICULAS */

#tsparticles{

position:fixed;
width:100%;
height:100%;
z-index:-5;

}

/* TITULO */

.titulo{

font-size:40px;

margin-top:10px;

background:linear-gradient(90deg,#FFD700,#fff4b0,#FFD700);

background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:brillo 6s linear infinite;

text-align:center;

}

@keyframes brillo{

0%{background-position:0%}
100%{background-position:200%}

}

/* BARRA PROGRESO */

.barra-contenedor{

width:70%;

height:32px;

background:rgba(255,255,255,.25);

border-radius:30px;

overflow:hidden;

margin-top:10px;
margin-bottom:10px;

}

.barra-progreso{

height:100%;

width:0%;

background:linear-gradient(90deg,#ffd000,#ffae00,#ffd000);

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

color:#1a1a1a;

transition:width 1s ease;

font-size:14px;

}

/* SALUDO */

#saludo{

font-size:22px;

animation:fade 3s infinite alternate;

}

@keyframes fade{

from{opacity:.5}
to{opacity:1}

}

#hora{

font-size:18px;
opacity:.8;

margin-bottom:10px;

}

/* CONTADOR */

.contenedor{

display:flex;
gap:14px;

}

.caja{

background:rgba(20,30,60,.95);

padding:16px;

border-radius:16px;

min-width:95px;

text-align:center;

box-shadow:0 15px 35px rgba(0,0,0,.6);

}

.numero{

font-size:36px;

font-weight:bold;

color:#FFD700;

text-shadow:0 4px 10px rgba(0,0,0,.6);

}

.caja div:last-child{

font-size:13px;

margin-top:4px;

}

/* CLIMA */

.clima{

position:absolute;

left:20px;
top:240px;

width:220px;

background:linear-gradient(180deg,#2193b0,#6dd5ed);

border-radius:18px;

padding:15px;

box-shadow:0 15px 35px rgba(0,0,0,.6);

}

.temp{

font-size:42px;

}

/* CARRUSEL */

.carrusel{

position:relative;

width:60%;
height:240px;

margin-top:15px;

border-radius:20px;

overflow:hidden;

box-shadow:0 20px 40px rgba(0,0,0,.7);

}

.slide{

position:absolute;

width:100%;
height:100%;

opacity:0;

transition:opacity 1.5s;

}

.slide img{

width:100%;
height:100%;
object-fit:cover;

}

.activo{

opacity:1;

}

/* FRASE */

.versiculo{

margin-top:10px;

background:rgba(0,0,0,.5);

padding:10px;

border-radius:15px;

width:60%;

text-align:center;

}

/* VIDEO */

.videoFull{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
align-items:center;
justify-content:center;

opacity:0;

pointer-events:none;

transition:opacity 2s ease;

z-index:50;

}

.videoFull.activo{

opacity:1;

pointer-events:auto;

}

video{

width:100%;
height:100%;
object-fit:cover;

}

</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="titulo">

47° Aniversario<br>
Drogadictos Anónimos A.C.

</div>

<div class="barra-contenedor">
<div class="barra-progreso" id="barraProgreso">
<span id="textoBarra"></span>
</div>
</div>

<div id="saludo"></div>

<div id="hora"></div>

<div class="contenedor">

<div class="caja">
<div id="anios" class="numero"></div>
<div>Años</div>
</div>

<div class="caja">
<div id="meses" class="numero"></div>
<div>Meses</div>
</div>

<div class="caja">
<div id="dias" class="numero"></div>
<div>Días</div>
</div>

<div class="caja">
<div id="horas" class="numero"></div>
<div>Horas</div>
</div>

<div class="caja">
<div id="minutos" class="numero"></div>
<div>Min</div>
</div>

<div class="caja">
<div id="segundos" class="numero"></div>
<div>Seg</div>
</div>

</div>

<div class="clima">

<h3>Mérida</h3>

<i class="wi wi-day-sunny" style="font-size:40px"></i>

<div id="temp" class="temp"></div>

<div id="desc"></div>

</div>

<div class="carrusel" id="carrusel"></div>

<div class="versiculo">

📖 <span id="versiculo"></span>

</div>

<div class="videoFull" id="videoDiv">

<video id="videoEvento" muted>

<source src="fotos/video.mp4" type="video/mp4">

</video>

</div>

<script>

/* HORA Y SALUDO */

function actualizarHora(){

let ahora=new Date()

let h=ahora.getHours()

let saludo="Buenas noches 🌙"

if(h>=6 && h<12) saludo="Buenos días ☀️"
if(h>=12 && h<19) saludo="Buenas tardes 🌇"

document.getElementById("saludo").innerText=saludo

document.getElementById("hora").innerText=
ahora.toLocaleTimeString()

}

setInterval(actualizarHora,1000)

/* CONTADOR */

const evento=new Date("2026-11-07T00:00:00")

function actualizarContador(){

let ahora=new Date()

let anios=evento.getFullYear()-ahora.getFullYear()
let meses=evento.getMonth()-ahora.getMonth()
let dias=evento.getDate()-ahora.getDate()

if(dias<0){

meses--

dias+=new Date(ahora.getFullYear(),ahora.getMonth()+1,0).getDate()

}

if(meses<0){

anios--
meses+=12

}

let diff=evento-ahora

let horas=Math.floor(diff/1000/60/60)%24
let minutos=Math.floor(diff/1000/60)%60
let segundos=Math.floor(diff/1000)%60

document.getElementById("anios").innerText=anios
document.getElementById("meses").innerText=meses
document.getElementById("dias").innerText=dias
document.getElementById("horas").innerText=horas
document.getElementById("minutos").innerText=minutos
document.getElementById("segundos").innerText=segundos

/* BARRA PROGRESO */

let totalDias=365

let restantes=Math.floor((evento-ahora)/(1000*60*60*24))

let progreso=((totalDias-restantes)/totalDias)*100

if(progreso<0) progreso=0
if(progreso>100) progreso=100

document.getElementById("barraProgreso").style.width=progreso+"%"

document.getElementById("textoBarra").innerText=
"Faltan "+restantes+" días para el aniversario"

}

setInterval(actualizarContador,1000)

/* CARRUSEL */

const imagenes=[]

for(let i=1;i<=8;i++){

imagenes.push("fotos/foto"+i+".jpg")

}

const carrusel=document.getElementById("carrusel")

imagenes.forEach((img,i)=>{

let div=document.createElement("div")

div.classList.add("slide")

if(i==0) div.classList.add("activo")

div.innerHTML=`<img src="${img}">`

carrusel.appendChild(div)

})

setInterval(()=>{

let slides=document.querySelectorAll(".slide")

let actual=document.querySelector(".activo")

let i=[...slides].indexOf(actual)

actual.classList.remove("activo")

slides[(i+1)%slides.length].classList.add("activo")

},5000)

/* CLIMA */

fetch("https://api.open-meteo.com/v1/forecast?latitude=20.97&longitude=-89.62&current_weather=true")

.then(r=>r.json())

.then(data=>{

document.getElementById("temp").innerText=
data.current_weather.temperature+"°C"

document.getElementById("desc").innerText="Clima actual"

})

/* FRASE BIBLICA */

const versiculos=[

"Todo lo puedo en aquel que me fortalece — Filipenses 4:13",

"El Señor es mi pastor nada me faltará — Salmos 23:1",

"Dios es nuestro refugio y fortaleza — Salmos 46:1",

"Busquen primero el reino de Dios — Mateo 6:33",

"La paz os dejo mi paz os doy — Juan 14:27",

"Confía en el Señor con todo tu corazón — Proverbios 3:5"

]

let hoy=new Date()

let i=(hoy.getDate()+hoy.getMonth())%versiculos.length

document.getElementById("versiculo").innerText=versiculos[i]

/* VIDEO */

const videoDiv=document.getElementById("videoDiv")
const video=document.getElementById("videoEvento")

function mostrarVideo(){

videoDiv.classList.add("activo")

video.currentTime=0

video.play()

}

video.onended=function(){

videoDiv.classList.remove("activo")

}

setInterval(()=>{

if(video.paused){

mostrarVideo()

}

},60000)

/* PARTICULAS */

tsParticles.load("tsparticles",{

particles:{
number:{value:120},
color:{value:["#ffd000","#ffffff","#ffae00"]},
size:{value:{min:1,max:4}},
move:{enable:true,speed:1}
}

})

</script>

</body>
</html>
