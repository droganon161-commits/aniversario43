<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>47 Aniversario</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Arial;
color:white;
overflow:hidden;
}

#vanta-bg{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

.container{
display:grid;
grid-template-columns:320px 1fr 320px;
height:100vh;
align-items:center;
padding:10px;
gap:10px;
}

.panel{
background:rgba(0,0,0,0.45);
backdrop-filter:blur(10px);
border-radius:15px;
padding:15px;
}

h1{
text-align:center;
font-size:40px;
margin:0;
text-shadow:0 0 20px rgba(0,0,0,0.7);
}

.clock{
text-align:center;
font-size:28px;
margin-top:5px;
}

.greeting{
text-align:center;
font-size:22px;
margin-bottom:10px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.6}
50%{opacity:1}
100%{opacity:0.6}
}

.counter{
font-size:26px;
text-align:center;
margin:10px 0;
}

.progress{
height:15px;
background:#333;
border-radius:20px;
overflow:hidden;
margin-top:5px;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#ffcc00,#ff6600);
width:0%;
}

.swiper{
width:100%;
max-width:700px;
height:380px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.swiper-slide img{
width:100%;
height:100%;
object-fit:cover;
}

.weather{
text-align:center;
font-size:18px;
}

.bible{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.6);
white-space:nowrap;
overflow:hidden;
}

.bible span{
display:inline-block;
padding-left:100%;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

#videoOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

#videoOverlay video{
width:100%;
height:100%;
object-fit:cover;
}

.notice{
font-size:18px;
margin-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.3);
padding-bottom:6px;
}

</style>
</head>

<body>

<div id="vanta-bg"></div>
<div id="particles-js"></div>

<div class="container">

<div class="panel">

<div class="weather">
<h2>Clima</h2>
<div id="temp"></div>
<div id="desc"></div>
<div id="rain"></div>
</div>

</div>

<div>

<h1>47° Aniversario</h1>

<div class="clock" id="clock"></div>
<div class="greeting" id="greeting"></div>

<div class="counter" id="countdown"></div>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<br>

<div class="swiper">
<div class="swiper-wrapper">

<div class="swiper-slide"><img src="fotos/1.jpg"></div>
<div class="swiper-slide"><img src="fotos/2.jpg"></div>
<div class="swiper-slide"><img src="fotos/3.jpg"></div>
<div class="swiper-slide"><img src="fotos/4.jpg"></div>
<div class="swiper-slide"><img src="fotos/5.jpg"></div>
<div class="swiper-slide"><img src="fotos/6.jpg"></div>
<div class="swiper-slide"><img src="fotos/7.jpg"></div>
<div class="swiper-slide"><img src="fotos/8.jpg"></div>

</div>
</div>

</div>

<div class="panel">

<h2>Avisos</h2>

<div id="avisos"></div>

</div>

</div>

<div class="bible">
<span id="verse"></span>
</div>

<div id="videoOverlay">
<video id="videoPlayer" src="fotos/video.mp4"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

new Swiper('.swiper',{
loop:true,
autoplay:{delay:3000}
});

function updateClock(){

let now=new Date();

let h=now.getHours();
let m=now.getMinutes().toString().padStart(2,"0");

document.getElementById("clock").innerText=h+":"+m;

let greeting="Buenas noches";

if(h<12) greeting="Buenos días";
else if(h<19) greeting="Buenas tardes";

document.getElementById("greeting").innerText=greeting;

}

setInterval(updateClock,1000);
updateClock();

let target=new Date("2026-11-07T00:00:00");

function updateCountdown(){

let now=new Date();

let diff=target-now;

let days=Math.floor(diff/1000/60/60/24);

let years=Math.floor(days/365);
let months=Math.floor((days%365)/30);
let d=(days%365)%30;

let hours=Math.floor(diff/1000/60/60)%24;
let mins=Math.floor(diff/1000/60)%60;

document.getElementById("countdown").innerText=
years+" años "+months+" meses "+d+" días "+hours+"h "+mins+"m";

let total=(target-new Date("2025-11-07"))/86400000;

let percent=(1-(days/total))*100;

document.getElementById("progress").style.width=percent+"%";

}

setInterval(updateCountdown,60000);
updateCountdown();

let verses=[
"Todo lo puedo en aquel que me fortalece. Filipenses 4:13",
"El Señor es mi pastor; nada me faltará. Salmo 23:1",
"Confía en el Señor con todo tu corazón. Proverbios 3:5",
"Porque donde están dos o tres reunidos en mi nombre, allí estoy yo. Mateo 18:20"
];

document.getElementById("verse").innerText=
verses[Math.floor(Math.random()*verses.length)];

async function getWeather(){

let key="TU_API_KEY";

let url=`https://api.openweathermap.org/data/2.5/weather?q=Merida,mx&units=metric&lang=es&appid=${key}`;

let data=await fetch(url).then(r=>r.json());

document.getElementById("temp").innerText=data.main.temp+"°C";
document.getElementById("desc").innerText=data.weather[0].description;

let forecast=await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=Merida,mx&appid=${key}&units=metric&lang=es`).then(r=>r.json());

let rainHour="";

forecast.list.forEach(f=>{
if(f.weather[0].main==="Rain" && rainHour===""){
rainHour=f.dt_txt.split(" ")[1];
}
});

document.getElementById("rain").innerText=
rainHour? "Probable lluvia: "+rainHour:"Sin lluvia cercana";

}

getWeather();
setInterval(getWeather,600000);

VANTA.WAVES({
el:"#vanta-bg",
color:0x1c3c6e,
shininess:40,
waveHeight:20,
waveSpeed:0.8
});

particlesJS("particles-js",{
particles:{
number:{value:50},
color:{value:"#ffffff"},
size:{value:3},
move:{speed:2}
}
});

async function cargarAvisos(){

let url="https://docs.google.com/spreadsheets/d/e/2PACX-1vQAwFHzlnoaHhvSuA5P8F9alWHymsSo870bkagSe0AxvejhnoHMkYFudw4FHBpFYmOwSI_aRl2OGLWX/pub?gid=0&single=true&output=csv";

let text=await fetch(url).then(r=>r.text());

let lines=text.split("\n");

let html="";

lines.forEach(l=>{
if(l.trim()!=""){
html+=`<div class="notice">${l}</div>`;
}
});

document.getElementById("avisos").innerHTML=html;

}

cargarAvisos();
setInterval(cargarAvisos,30000);

let video=document.getElementById("videoPlayer");
let overlay=document.getElementById("videoOverlay");

setInterval(()=>{

overlay.style.display="flex";
overlay.style.opacity=0;

let fade=setInterval(()=>{

overlay.style.opacity=parseFloat(overlay.style.opacity)+0.05;

if(overlay.style.opacity>=1) clearInterval(fade);

},50);

video.play();

video.onended=()=>{
overlay.style.display="none";
};

},300000);

</script>

</body>
</html>
