<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reloj con Clima</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:background 2s;
}

/* fondos */

.manana{
background:linear-gradient(#87ceeb,#ffffff);
color:black;
}

.tarde{
background:linear-gradient(#f39c12,#e67e22);
}

.noche{
background:linear-gradient(#0f2027,#203a43,#2c5364);
}

/* reloj */

.reloj{
display:flex;
gap:10px;
font-size:80px;
font-weight:bold;
}

.flip{
position:relative;
width:90px;
height:120px;
perspective:400px;
}

.numero{
background:#111;
border-radius:10px;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.flip.animar .numero{
animation:flip .6s;
}

@keyframes flip{

0%{
transform:rotateX(0deg);
}

50%{
transform:rotateX(-90deg);
}

100%{
transform:rotateX(0deg);
}

}

.fecha{
margin-top:20px;
font-size:30px;
}

.clima{
margin-top:30px;
font-size:35px;
text-align:center;
}

</style>

</head>

<body>

<div class="reloj">

<div class="flip">
<div class="numero" id="hora">00</div>
</div>

<div>:</div>

<div class="flip">
<div class="numero" id="min">00</div>
</div>

<div>:</div>

<div class="flip">
<div class="numero" id="seg">00</div>
</div>

</div>

<div class="fecha" id="fecha"></div>

<div class="clima">

<div id="ciudad">Mérida, Yucatán</div>

<div id="temperatura">--°C</div>

<div id="descripcion"></div>

<div id="lluvia"></div>

</div>

<script>

let prevHora=""
let prevMin=""
let prevSeg=""

/* animacion */

function animar(id){

const contenedor=document.getElementById(id).parentElement

contenedor.classList.remove("animar")

void contenedor.offsetWidth

contenedor.classList.add("animar")

}

/* reloj */

function actualizarReloj(){

const ahora=new Date()

let hora=String(ahora.getHours()).padStart(2,"0")

let min=String(ahora.getMinutes()).padStart(2,"0")

let seg=String(ahora.getSeconds()).padStart(2,"0")

if(hora!==prevHora){

document.getElementById("hora").textContent=hora

animar("hora")

prevHora=hora

}

if(min!==prevMin){

document.getElementById("min").textContent=min

animar("min")

prevMin=min

}

if(seg!==prevSeg){

document.getElementById("seg").textContent=seg

animar("seg")

prevSeg=seg

}

/* fecha */

const dias=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"]

const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"]

const fechaTexto=

dias[ahora.getDay()]+" "+
ahora.getDate()+" de "+
meses[ahora.getMonth()]+" de "+
ahora.getFullYear()

document.getElementById("fecha").textContent=fechaTexto

/* fondo segun hora */

let h=ahora.getHours()

if(h>=6 && h<12){

document.body.className="manana"

}

else if(h>=12 && h<19){

document.body.className="tarde"

}

else{

document.body.className="noche"

}

}

/* clima */

async function obtenerClima(){

const url="https://api.open-meteo.com/v1/forecast?latitude=20.97&longitude=-89.62&current_weather=true&hourly=precipitation_probability"

const respuesta=await fetch(url)

const datos=await respuesta.json()

const temp=datos.current_weather.temperature

document.getElementById("temperatura").textContent=temp+" °C"

const lluvia=datos.hourly.precipitation_probability

const horaActual=new Date().getHours()

let prob=lluvia[horaActual]

if(prob>50){

document.getElementById("lluvia").textContent="Alta probabilidad de lluvia"

}

else{

document.getElementById("lluvia").textContent="Baja probabilidad de lluvia"

}

}

/* iniciar */

setInterval(actualizarReloj,1000)

actualizarReloj()

obtenerClima()

</script>

</body>
</html>
