<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>43° Aniversario Drogadictos Anónimos AC</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Segoe UI;
background:linear-gradient(180deg,#1f3c88,#0f1f4d);
color:white;
overflow-x:hidden;
text-align:center;

}

#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.main{

padding:20px;

}

h1{

color:#ffd000;
margin-bottom:10px;

}

.info{

margin-bottom:20px;
font-size:18px;

}

#clima{

font-size:24px;
color:#ffd000;
margin-top:5px;

}

#hora{

font-size:20px;

}

#saludo{

font-size:22px;
margin-top:5px;

}

/* contador */

.contenedor{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;

}

.caja{

background:rgba(20,30,60,0.9);
padding:18px;
border-radius:18px;
width:100px;
box-shadow:0 15px 35px rgba(0,0,0,0.6);

}

.numero{

font-size:28px;
color:#ffd000;
font-weight:bold;
animation:flip 1s;

}

.texto{

font-size:12px;

}

@keyframes flip{

0%{transform:rotateX(90deg)}
100%{transform:rotateX(0)}

}

/* carrusel */

.carrusel{

position:relative;
width:95%;
height:40vh;
overflow:hidden;
margin:25px auto;
border-radius:20px;

}

.slide{

position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1.5s;

}

.slide img{

width:100%;
height:100%;
object-fit:cover;

}

.activo{

opacity:1;

}

</style>

</head>

<body>

<div id="tsparticles"></div>

<div class="main">

<h1>🎉 43° Aniversario Drogadictos Anónimos AC</h1>

<div class="info">

📍 Santa Cruz Palomeque, Mérida, Yucatán

<div id="clima">Cargando clima...</div>

<div id="hora"></div>

<div id="saludo"></div>

</div>

<div class="contenedor">

<div class="caja"><div id="dias" class="numero"></div><div class="texto">DÍAS</div></div>

<div class="caja"><div id="horas" class="numero"></div><div class="texto">HORAS</div></div>

<div class="caja"><div id="minutos" class="numero"></div><div class="texto">MINUTOS</div></div>

<div class="caja"><div id="segundos" class="numero"></div><div class="texto">SEGUNDOS</div></div>

</div>

<div class="carrusel" id="carrusel"></div>

</div>

<script>

/* RELOJ */

function reloj(){

const ahora=new Date();

let h=ahora.getHours();
let m=ahora.getMinutes();
let s=ahora.getSeconds();

document.getElementById("hora").innerText=
"🕒 "+h+":"+m+":"+s;

let saludo="";

if(h<12) saludo="☀ Buenos días";
else if(h<19) saludo="🌤 Buenas tardes";
else saludo="🌙 Buenas noches";

document.getElementById("saludo").innerText=saludo;

}

setInterval(reloj,1000);

/* CONTADOR */

const fechaEvento=new Date("2026-11-07T00:00:00");

function contador(){

const ahora=new Date();

let diff=fechaEvento-ahora;

let dias=Math.floor(diff/(1000*60*60*24));
let horas=Math.floor(diff/(1000*60*60)%24);
let minutos=Math.floor(diff/(1000*60)%60);
let segundos=Math.floor(diff/1000%60);

document.getElementById("dias").innerText=dias;
document.getElementById("horas").innerText=horas;
document.getElementById("minutos").innerText=minutos;
document.getElementById("segundos").innerText=segundos;

}

setInterval(contador,1000);

/* CARRUSEL */

const carrusel=document.getElementById("carrusel");

for(let i=1;i<=8;i++){

let div=document.createElement("div");

div.classList.add("slide");

if(i==1)div.classList.add("activo");

let img=document.createElement("img");

img.src="fotos/foto"+i+".jpg";

div.appendChild(img);

carrusel.appendChild(div);

}

setInterval(()=>{

let slides=document.querySelectorAll(".slide");

let actual=document.querySelector(".activo");

let index=[...slides].indexOf(actual);

actual.classList.remove("activo");

slides[(index+1)%slides.length].classList.add("activo");

},4000);

/* CLIMA */

fetch("https://api.open-meteo.com/v1/forecast?latitude=20.97&longitude=-89.63&current_weather=true")

.then(res=>res.json())

.then(data=>{

let temp=data.current_weather.temperature;
let code=data.current_weather.weathercode;

document.getElementById("clima").innerText="🌡 "+temp+"°C";

animacionClima(code);

});

/* animacion clima */

function animacionClima(code){

let color="#ffffff";

if(code==0) color="#ffd000";

if(code>50) color="#00aaff";

tsParticles.load("tsparticles",{

particles:{
number:{value:120},
color:{value:color},
size:{value:{min:1,max:4}},
move:{enable:true,speed:1}
}

});

}

</script>

</body>
</html>
