<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>43° Aniversario Drogadictos Anónimos AC</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#1f3c88,#0f1f4d);
color:white;
overflow-x:hidden;
}

#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.main{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:25px 15px;
text-align:center;
}

h1{
font-size:28px;
color:#ffcc00;
margin-bottom:10px;
}

.info{
margin-bottom:20px;
font-size:16px;
}

.clima{
font-size:18px;
font-weight:bold;
margin-top:5px;
color:#ffd000;
}

.hora{
font-size:16px;
margin-top:5px;
}

.saludo{
font-size:18px;
margin-top:5px;
color:#ffffff;
}

/* BARRA */

.barra-contenedor{
width:95%;
height:32px;
background:rgba(255,255,255,0.2);
border-radius:25px;
overflow:hidden;
margin-bottom:30px;
}

.barra-progreso{
height:100%;
width:0%;
background:linear-gradient(90deg,#ffd000,#ffae00,#ffcc00);
border-radius:25px;
transition:width 1s ease;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:#1f1f1f;
font-size:12px;
}

/* CONTADOR */

.contenedor{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.caja{
background:rgba(20,30,60,0.9);
padding:18px 15px;
border-radius:18px;
width:90px;
box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.numero{
font-size:24px;
font-weight:bold;
color:#ffcc00;
}

.texto{
font-size:12px;
margin-top:5px;
}

/* CARRUSEL */

.carrusel{
position:relative;
width:95%;
height:40vh;
overflow:hidden;
border-radius:20px;
margin-bottom:25px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1.5s ease-in-out;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.activo{opacity:1;}

</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="main">

<h1>📅 43° Aniversario Drogadictos Anónimos AC</h1>

<div class="info">

<div>📍 Santa Cruz Palomeque, Mérida, Yucatán</div>

<div class="clima" id="clima">Cargando clima...</div>

<div class="hora" id="hora"></div>

<div class="saludo" id="saludo"></div>

</div>

<div class="barra-contenedor">
<div class="barra-progreso" id="barraProgreso">
<span id="textoBarra"></span>
</div>
</div>

<div class="contenedor">
<div class="caja"><div class="numero" id="anios">0</div><div class="texto">AÑOS</div></div>
<div class="caja"><div class="numero" id="meses">0</div><div class="texto">MESES</div></div>
<div class="caja"><div class="numero" id="dias">0</div><div class="texto">DÍAS</div></div>
<div class="caja"><div class="numero" id="horas">0</div><div class="texto">HORAS</div></div>
<div class="caja"><div class="numero" id="minutos">0</div><div class="texto">MINUTOS</div></div>
<div class="caja"><div class="numero" id="segundos">0</div><div class="texto">SEGUNDOS</div></div>
</div>

<div class="carrusel" id="carrusel"></div>

</div>

<script>

/* RELOJ Y SALUDO */

function actualizarHora(){

const ahora=new Date();

let h=ahora.getHours();
let m=ahora.getMinutes();
let s=ahora.getSeconds();

document.getElementById("hora").innerText=
"🕒 "+h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0");

let saludo="";

if(h<12) saludo="☀️ Buenos días";
else if(h<19) saludo="🌤 Buenas tardes";
else saludo="🌙 Buenas noches";

document.getElementById("saludo").innerText=saludo;

}

setInterval(actualizarHora,1000);
actualizarHora();

/* CONTADOR */

const totalDias=365;
const fechaEvento=new Date("2026-11-07T00:00:00");

function actualizar(){

const ahora=new Date();

let diff=fechaEvento-ahora;

let segundos=Math.floor(diff/1000)%60;
let minutos=Math.floor(diff/(1000*60))%60;
let horas=Math.floor(diff/(1000*60*60))%24;

let totalDiasRestantes=Math.floor(diff/(1000*60*60*24));

let anios=Math.floor(totalDiasRestantes/365);
let meses=Math.floor((totalDiasRestantes%365)/30);
let dias=(totalDiasRestantes%365)%30;

document.getElementById("anios").innerText=anios;
document.getElementById("meses").innerText=meses;
document.getElementById("dias").innerText=dias;
document.getElementById("horas").innerText=horas;
document.getElementById("minutos").innerText=minutos;
document.getElementById("segundos").innerText=segundos;

let progreso=((totalDias-totalDiasRestantes)/totalDias)*100;

document.getElementById("barraProgreso").style.width=progreso+"%";

document.getElementById("textoBarra").innerText=
"Faltan "+totalDiasRestantes+" días";

}

setInterval(actualizar,1000);
actualizar();

/* CARRUSEL */

const imagenes=[];

for(let i=1;i<=8;i++){
imagenes.push("foto"+i+".jpg");
}

const carrusel=document.getElementById("carrusel");

imagenes.forEach((nombre,index)=>{

const div=document.createElement("div");
div.classList.add("slide");

if(index===0)div.classList.add("activo");

const img=document.createElement("img");
img.src="fotos/"+nombre;

div.appendChild(img);
carrusel.appendChild(div);

});

setInterval(()=>{

let slides=document.querySelectorAll(".slide");
let actual=document.querySelector(".slide.activo");

let index=Array.from(slides).indexOf(actual);

actual.classList.remove("activo");

slides[(index+1)%slides.length].classList.add("activo");

},4000);

/* CLIMA MERIDA */

fetch("https://api.open-meteo.com/v1/forecast?latitude=20.97&longitude=-89.63&current_weather=true")

.then(res=>res.json())

.then(data=>{

let temp=data.current_weather.temperature;
let code=data.current_weather.weathercode;

document.getElementById("clima").innerText=
"🌡 "+temp+"°C";

animacionClima(code);

});

function animacionClima(code){

let color="#ffffff";

if(code==0){
color="#ffd000";
}

else if(code<4){
color="#cccccc";
}

else if(code>=61){
color="#00aaff";
}

tsParticles.load("tsparticles",{

particles:{
number:{value:120},
color:{value:color},
size:{value:{min:1,max:4}},
move:{enable:true,speed:1}
}

});

}

</script>

</body>
</html>
