<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>43° Aniversario Drogadictos Anónimos AC</title>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#1f3c88,#0f1f4d);
    color:white;
    overflow-x:hidden;
}

#tsparticles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.main{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:25px 15px;
    text-align:center;
}

h1{
    font-size:26px;
    color:#ffcc00;
    margin-bottom:15px;
}

/* ===== UBICACIÓN ===== */

.ubicacion{
    font-size:18px;
    font-weight:bold;
    margin-bottom:5px;
}

/* ===== HORA ===== */

.hora{
    font-size:16px;
    margin-bottom:15px;
}

/* ===== CLIMA GRANDE ===== */

.clima-grande{
    background:rgba(20,30,60,0.9);
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.6);
    margin-bottom:25px;
    width:95%;
    max-width:400px;
}

.clima-icono{
    font-size:55px;
}

.clima-temp{
    font-size:40px;
    font-weight:bold;
    color:#ffd000;
}

.clima-desc{
    font-size:16px;
    margin-top:5px;
}

/* ===== BARRA ===== */

.barra-contenedor{
    width:95%;
    height:32px;
    background:rgba(255,255,255,0.2);
    border-radius:25px;
    overflow:hidden;
    margin-bottom:30px;
}

.barra-progreso{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#ffd000,#ffae00,#ffcc00);
    border-radius:25px;
    transition:width 1s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#1f1f1f;
    font-size:12px;
}

/* ===== CONTADOR ===== */

.contenedor{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
}

.caja{
    background:rgba(20,30,60,0.9);
    padding:18px 15px;
    border-radius:18px;
    width:90px;
    box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.numero{
    font-size:24px;
    font-weight:bold;
    color:#ffcc00;
    transition:transform .3s ease, opacity .3s ease;
}

.numero.animar{
    transform:scale(1.3);
    opacity:0.5;
}

.texto{
    font-size:12px;
}

@media(min-width:768px){
h1{font-size:40px;}
.numero{font-size:30px;}
.caja{width:110px;}
}
</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="main">

<h1>📅 43° Aniversario Drogadictos Anónimos AC</h1>

<div class="ubicacion" id="ubicacion">📍 Detectando ubicación...</div>
<div class="hora" id="horaActual">🕒 --:--:--</div>

<div class="clima-grande">
    <div class="clima-icono" id="iconoClima">⛅</div>
    <div class="clima-temp" id="tempClima">--°C</div>
    <div class="clima-desc" id="descClima">Cargando clima...</div>
</div>

<div class="barra-contenedor">
    <div class="barra-progreso" id="barraProgreso">
        <span id="textoBarra"></span>
    </div>
</div>

<div class="contenedor">
    <div class="caja"><div class="numero" id="anios">0</div><div class="texto">AÑOS</div></div>
    <div class="caja"><div class="numero" id="meses">0</div><div class="texto">MESES</div></div>
    <div class="caja"><div class="numero" id="dias">0</div><div class="texto">DÍAS</div></div>
    <div class="caja"><div class="numero" id="horas">0</div><div class="texto">HORAS</div></div>
    <div class="caja"><div class="numero" id="minutos">0</div><div class="texto">MINUTOS</div></div>
    <div class="caja"><div class="numero" id="segundos">0</div><div class="texto">SEGUNDOS</div></div>
</div>

</div>

<script>

const fechaEvento=new Date("2026-11-07T00:00:00");
const totalDias=365;

/* ANIMACIÓN CONTADOR */
function animar(id,valor){
let el=document.getElementById(id);
if(el.innerText!=valor){
el.classList.add("animar");
setTimeout(()=>{el.innerText=valor;el.classList.remove("animar");},150);
}
}

function actualizar(){
let ahora=new Date();
let diff=fechaEvento-ahora;
if(diff<=0){return;}

let seg=Math.floor(diff/1000)%60;
let min=Math.floor(diff/(1000*60))%60;
let hrs=Math.floor(diff/(1000*60*60))%24;
let totalDiasRestantes=Math.floor(diff/(1000*60*60*24));
let anios=Math.floor(totalDiasRestantes/365);
let meses=Math.floor((totalDiasRestantes%365)/30);
let dias=(totalDiasRestantes%365)%30;

animar("anios",anios);
animar("meses",meses);
animar("dias",dias);
animar("horas",hrs);
animar("minutos",min);
animar("segundos",seg);

let progreso=((totalDias-totalDiasRestantes)/totalDias)*100;
if(progreso<0)progreso=0;
if(progreso>100)progreso=100;

document.getElementById("barraProgreso").style.width=progreso+"%";
document.getElementById("textoBarra").innerText=`Faltan ${totalDiasRestantes} días`;
}
setInterval(actualizar,1000);
actualizar();

/* HORA */
setInterval(()=>{
document.getElementById("horaActual").innerText=
"🕒 "+new Date().toLocaleTimeString();
},1000);

/* CLIMA + UBICACIÓN */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async pos=>{
let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

/* CIUDAD */
let geo=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
let geoData=await geo.json();
let ciudad=geoData.address.city||geoData.address.town||geoData.address.village||"Tu ciudad";
let pais=geoData.address.country;
document.getElementById("ubicacion").innerText=`📍 Estamos en ${ciudad}, ${pais}`;

/* CLIMA */
let clima=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
let data=await clima.json();
let temp=data.current_weather.temperature;
let codigo=data.current_weather.weathercode;

let icono="⛅";
let descripcion="Clima agradable";

if(codigo==0){icono="☀️";descripcion="Cielo despejado";}
else if(codigo<3){icono="🌤️";descripcion="Parcialmente nublado";}
else if(codigo<60){icono="☁️";descripcion="Nublado";}
else if(codigo<70){icono="🌧️";descripcion="Lluvia ligera";}
else if(codigo<80){icono="🌧️";descripcion="Lluvia moderada";}
else if(codigo<90){icono="🌩️";descripcion="Tormenta";}
else{icono="❄️";descripcion="Nieve";}

document.getElementById("iconoClima").innerText=icono;
document.getElementById("tempClima").innerText=temp+"°C";
document.getElementById("descClima").innerText=descripcion;

});
}

tsParticles.load("tsparticles",{particles:{number:{value:120},move:{enable:true,speed:1,direction:"top"}}});

</script>

</body>
</html>
