<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>43 Aniversario</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;
overflow:hidden;

background:linear-gradient(180deg,#1a2a6c,#0f2027);

color:white;

display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;

}

/* PARTICULAS */

#particles{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

z-index:-1;

}

/* TITULO */

h1{

margin-top:10px;
font-size:28px;
color:#FFD700;

}

/* SALUDO */

#saludo{

font-size:20px;
margin-top:4px;

}

/* HORA */

#hora{

font-size:18px;
opacity:0.8;

}

/* CONTADOR */

.contador{

display:flex;
gap:10px;
margin-top:10px;

}

.caja{

background:rgba(0,0,0,0.6);

padding:12px;

border-radius:12px;

text-align:center;

min-width:70px;

}

.numero{

font-size:24px;
color:#FFD700;

}

/* CLIMA */

.clima{

position:absolute;

left:20px;
top:220px;

width:200px;

background:linear-gradient(180deg,#2193b0,#6dd5ed);

border-radius:15px;

padding:15px;

box-shadow:0 10px 30px rgba(0,0,0,0.5);

}

.clima h3{

margin-bottom:5px;

}

.temp{

font-size:38px;

}

/* CARRUSEL */

.carrusel{

width:60%;

margin-top:10px;

border-radius:15px;

overflow:hidden;

box-shadow:0 20px 40px rgba(0,0,0,0.6);

}

.carrusel img{

width:100%;
height:220px;
object-fit:cover;

}

/* FRASE */

.versiculo{

margin-top:8px;

width:60%;

background:rgba(0,0,0,0.6);

padding:10px;

border-radius:12px;

font-size:14px;

text-align:center;

}

/* VIDEO */

.videoFull{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
align-items:center;
justify-content:center;

opacity:0;

pointer-events:none;

transition:opacity 2s;

z-index:10;

}

.videoFull.activo{

opacity:1;
pointer-events:auto;

}

video{

width:100%;
height:100%;
object-fit:cover;

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>43° ANIVERSARIO</h1>

<div id="saludo"></div>

<div id="hora"></div>

<div class="contador">

<div class="caja">
<div class="numero" id="dias"></div>
Días
</div>

<div class="caja">
<div class="numero" id="horas"></div>
Horas
</div>

<div class="caja">
<div class="numero" id="minutos"></div>
Min
</div>

<div class="caja">
<div class="numero" id="segundos"></div>
Seg
</div>

</div>

<div class="clima">

<h3>Mérida</h3>

<i class="wi wi-day-sunny" style="font-size:40px"></i>

<div class="temp" id="temp"></div>

<div id="descripcion"></div>

</div>

<div class="carrusel">

<img id="imagenCarrusel" src="fotos/foto1.jpg">

</div>

<div class="versiculo">

📖 <span id="versiculo"></span>

</div>

<div class="videoFull" id="videoDiv">

<video muted id="videoEvento">

<source src="fotos/video.mp4" type="video/mp4">

</video>

</div>

<script>

/* SALUDO Y HORA */

function actualizarHora(){

let ahora = new Date()

let horas = ahora.getHours()

let saludo = "Buenas noches"

if(horas>=6 && horas<12) saludo="Buenos días"
if(horas>=12 && horas<19) saludo="Buenas tardes"

document.getElementById("saludo").innerText=saludo

document.getElementById("hora").innerText=ahora.toLocaleTimeString()

}

setInterval(actualizarHora,1000)

/* CONTADOR */

const fechaEvento = new Date("2026-11-07T00:00:00")

function actualizarContador(){

let ahora = new Date()

let diff = fechaEvento - ahora

let dias = Math.floor(diff/1000/60/60/24)
let horas = Math.floor(diff/1000/60/60)%24
let minutos = Math.floor(diff/1000/60)%60
let segundos = Math.floor(diff/1000)%60

document.getElementById("dias").innerText=dias
document.getElementById("horas").innerText=horas
document.getElementById("minutos").innerText=minutos
document.getElementById("segundos").innerText=segundos

}

setInterval(actualizarContador,1000)

/* CARRUSEL */

const imagenes=[

"fotos/foto1.jpg",
"fotos/foto2.jpg",
"fotos/foto3.jpg",
"fotos/foto4.jpg"

]

let index=0

setInterval(()=>{

index++

if(index>=imagenes.length) index=0

document.getElementById("imagenCarrusel").src=imagenes[index]

},5000)

/* CLIMA */

fetch("https://api.open-meteo.com/v1/forecast?latitude=20.97&longitude=-89.62&current_weather=true")

.then(r=>r.json())

.then(data=>{

document.getElementById("temp").innerText=data.current_weather.temperature+"°C"

document.getElementById("descripcion").innerText="Actual"

})

/* FRASE BIBLICA */

const versiculos=[

"Todo lo puedo en aquel que me fortalece — Filipenses 4:13",

"El Señor es mi pastor, nada me faltará — Salmos 23:1",

"Dios es nuestro amparo y fortaleza — Salmos 46:1",

"Busquen primero el reino de Dios — Mateo 6:33",

"Confía en el Señor con todo tu corazón — Proverbios 3:5",

"La paz os dejo, mi paz os doy — Juan 14:27"

]

let hoy=new Date()

let indice=(hoy.getDate()+hoy.getMonth())%versiculos.length

document.getElementById("versiculo").innerText=versiculos[indice]

/* VIDEO */

const videoDiv=document.getElementById("videoDiv")

const video=document.getElementById("videoEvento")

function mostrarVideo(){

videoDiv.classList.add("activo")

video.currentTime=0

video.play()

setTimeout(()=>{

videoDiv.classList.remove("activo")

},20000)

}

setInterval(mostrarVideo,60000)

/* PARTICULAS */

const canvas=document.getElementById("particles")

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth

canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*3+1,

dx:(Math.random()-0.5),

dy:(Math.random()-0.5)

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

ctx.beginPath()

ctx.arc(p.x,p.y,p.r,0,Math.PI*2)

ctx.fillStyle="rgba(255,215,0,0.6)"

ctx.fill()

p.x+=p.dx
p.y+=p.dy

if(p.x<0||p.x>canvas.width)p.dx*=-1
if(p.y<0||p.y>canvas.height)p.dy*=-1

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
