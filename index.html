height:100%;

display:none;

z-index:50;

<script>

/* RELOJ */

function reloj(){

let now=new Date()

let hora=now.getHours()

let saludo="Buenas noches"

if(hora<12)saludo="Buenos días"
else if(hora<19)saludo="Buenas tardes"

document.getElementById("saludo").innerText=saludo
document.getElementById("hora").innerText=now.toLocaleTimeString()

}

setInterval(reloj,1000)



/* CONTADOR */

const evento=new Date("Nov 7, 2026 00:00:00")

function contador(){

let now=new Date()

let diff=evento-now

let min=Math.floor(diff/1000/60)%60
let hrs=Math.floor(diff/1000/60/60)%24
let dias=Math.floor(diff/1000/60/60/24)
let meses=Math.floor(dias/30)
let años=Math.floor(meses/12)

meses=meses%12
dias=dias%30

document.getElementById("years").innerText=años
document.getElementById("months").innerText=meses
document.getElementById("days").innerText=dias
document.getElementById("hours").innerText=hrs
document.getElementById("minutes").innerText=min

document.getElementById("faltan").innerText="Faltan "+Math.floor(diff/1000/60/60/24)+" días"

let progreso=100-(dias/365*100)

document.getElementById("progress").style.width=progreso+"%"

}

setInterval(contador,1000)



/* CARRUSEL */

const fotos=document.querySelectorAll(".carousel img")

let i=0

function carrusel(){

fotos.forEach(f=>f.classList.remove("active"))

fotos[i].classList.add("active")

i++

if(i>=fotos.length)i=0

}

setInterval(carrusel,4000)

carrusel()

function verso(){

let v=versos[Math.floor(Math.random()*versos.length)]

document.getElementById("versiculo").innerText=v

}

/* VIDEO */

function video(){

let cont=document.getElementById("videoContainer")
let vid=document.getElementById("video")

cont.style.display="flex"

setTimeout(()=>{cont.style.opacity=1},100)

vid.play()

setTimeout(()=>{

cont.style.opacity=0

setTimeout(()=>{
cont.style.display="none"
vid.pause()
vid.currentTime=0
},2000)

},234000)

}

setInterval(video,300000)



/* CLIMA */

fetch("https://api.openweathermap.org/data/2.5/forecast?q=Merida,mx&units=metric&appid=1db39afe6a8f78e9555d668c8852b1fb")

.then(r=>r.json())

.then(data=>{

let clima=data.list[0]

document.getElementById("temp").innerHTML=Math.round(clima.main.temp)+"°C"
document.getElementById("desc").innerHTML=clima.weather[0].description

let lluvia=[]
let horas=[]

for(let i=0;i<8;i++){

horas.push(data.list[i].dt_txt.split(" ")[1].substring(0,5))

lluvia.push((data.list[i].pop||0)*100)

}

new Chart(document.getElementById("lluviaChart"),{
type:"line",
data:{
labels:horas,
datasets:[{label:"Lluvia %",data:lluvia}]
}
})

})



/* FONDO SEGUN HORA */

function fondo(){

let hora=new Date().getHours()

let bg=document.getElementById("background")

if(hora<12)

bg.style.background="linear-gradient(#ffd89b,#19547b)"

else if(hora<19)

bg.style.background="linear-gradient(#ff9966,#ff5e62)"

else

bg.style.background="linear-gradient(#141E30,#243B55)"

}

fondo()



/* PARTICULAS */

const canvas=document.createElement("canvas")

document.getElementById("particles").appendChild(canvas)

const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let parts=[]

for(let i=0;i<80;i++){

parts.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
vx:Math.random()*0.5,
vy:Math.random()*0.5

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

parts.forEach(p=>{

ctx.beginPath()

ctx.arc(p.x,p.y,p.r,0,Math.PI*2)

ctx.fillStyle="rgba(255,255,255,0.3)"

ctx.fill()

p.x+=p.vx
p.y+=p.vy

})

requestAnimationFrame(draw)

}

draw()
