<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>47 Aniversario</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

#vanta-bg{
position:fixed;
width:100%;
height:100%;
z-index:-3;
}

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-2;
pointer-events:none;
}

.container{
display:grid;
grid-template-columns:300px 1fr 300px;
height:100vh;
align-items:center;
padding:15px;
gap:15px;
}

.panel{
background:rgba(0,0,0,0.45);
backdrop-filter:blur(10px);
border-radius:15px;
padding:15px;
}

.center{
text-align:center;
}

.title{
font-size:42px;
margin-bottom:5px;
text-shadow:0 0 15px black;
}

.clock{
font-size:28px;
}

.greeting{
font-size:22px;
margin-bottom:10px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}
}

/* CONTADOR */

.countdown-card{

background: rgba(0,0,0,0.55);
backdrop-filter: blur(12px);
border-radius:18px;

padding:20px;
margin:15px auto;

width:650px;

box-shadow:0 0 25px rgba(0,0,0,0.6);

}

.counter{

display:flex;
justify-content:center;
gap:14px;
margin-bottom:12px;

}

.box{

background:rgba(0,0,0,0.65);
border-radius:12px;

padding:15px;

width:90px;
text-align:center;

box-shadow:0 0 10px rgba(0,0,0,0.5);

}

.box .num{

font-size:28px;
font-weight:bold;

}

.box label{

font-size:14px;
opacity:0.8;

}

.progressText{

font-size:18px;
margin-bottom:6px;

}

.progressBar{

width:100%;
height:16px;

background:#222;

border-radius:20px;
overflow:hidden;

}

.progressFill{

height:100%;

width:0%;

background:linear-gradient(90deg,#FFD54F,#FF9800);

transition:width 0.6s;

}

/* CARRUSEL */

.swiper{
width:650px;
height:360px;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 20px black;
}

.swiper img{
width:100%;
height:100%;
object-fit:cover;
}

/* CLIMA */

.weather{
font-size:18px;
text-align:center;
}

/* AVISOS */

.notice{
margin-bottom:10px;
border-bottom:1px solid rgba(255,255,255,0.3);
padding-bottom:6px;
}

/* FRASE BIBLICA */

.bible{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.6);
white-space:nowrap;
overflow:hidden;
}

.bible span{
display:inline-block;
padding-left:100%;
animation:scroll 30s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* VIDEO */

#videoOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:10;
}

#videoOverlay video{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div id="vanta-bg"></div>
<div id="particles-js"></div>

<div class="container">

<!-- CLIMA -->

<div class="panel weather">

<h2>Clima</h2>

<div id="temp"></div>
<div id="desc"></div>
<div id="rain"></div>

</div>

<!-- CENTRO -->

<div class="center">

<div class="title">47° Aniversario</div>

<div class="clock" id="clock"></div>
<div class="greeting" id="greeting"></div>

<div class="countdown-card">

<div class="counter">

<div class="box">
<div class="num" id="years"></div>
<label>Años</label>
</div>

<div class="box">
<div class="num" id="months"></div>
<label>Meses</label>
</div>

<div class="box">
<div class="num" id="days"></div>
<label>Días</label>
</div>

<div class="box">
<div class="num" id="hours"></div>
<label>Horas</label>
</div>

<div class="box">
<div class="num" id="minutes"></div>
<label>Min</label>
</div>

</div>

<div class="progressText" id="faltan"></div>

<div class="progressBar">
<div class="progressFill" id="progress"></div>
</div>

</div>

<br>

<div class="swiper">

<div class="swiper-wrapper">

<div class="swiper-slide"><img src="fotos/1.jpg"></div>
<div class="swiper-slide"><img src="fotos/2.jpg"></div>
<div class="swiper-slide"><img src="fotos/3.jpg"></div>
<div class="swiper-slide"><img src="fotos/4.jpg"></div>
<div class="swiper-slide"><img src="fotos/5.jpg"></div>
<div class="swiper-slide"><img src="fotos/6.jpg"></div>
<div class="swiper-slide"><img src="fotos/7.jpg"></div>
<div class="swiper-slide"><img src="fotos/8.jpg"></div>

</div>

</div>

</div>

<!-- AVISOS -->

<div class="panel">

<h2>Avisos</h2>

<div id="avisos"></div>

</div>

</div>

<div class="bible">
<span id="verse"></span>
</div>

<div id="videoOverlay">
<video id="videoPlayer" src="fotos/video.mp4"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

/* CARRUSEL */

new Swiper('.swiper',{
loop:true,
autoplay:{delay:3000}
})

/* RELOJ */

function updateClock(){

let now=new Date()

let h=now.getHours()
let m=now.getMinutes().toString().padStart(2,"0")

document.getElementById("clock").innerText=h+":"+m

let greet="Buenas noches"

if(h<12) greet="Buenos días"
else if(h<19) greet="Buenas tardes"

document.getElementById("greeting").innerText=greet

}

setInterval(updateClock,1000)
updateClock()

/* CONTADOR */

let target=new Date("2026-11-07T00:00:00")

function countdown(){

let now=new Date()

let diff=target-now

let totalDays=Math.floor(diff/1000/60/60/24)

let years=Math.floor(totalDays/365)
let months=Math.floor((totalDays%365)/30)
let days=(totalDays%365)%30

let hours=Math.floor(diff/1000/60/60)%24
let minutes=Math.floor(diff/1000/60)%60

document.getElementById("years").innerText=years
document.getElementById("months").innerText=months
document.getElementById("days").innerText=days
document.getElementById("hours").innerText=hours
document.getElementById("minutes").innerText=minutes

document.getElementById("faltan").innerText="Faltan "+totalDays+" días"

let total=(target-new Date("2025-11-07"))/86400000

let percent=(1-(totalDays/total))*100

document.getElementById("progress").style.width=percent+"%"

}

setInterval(countdown,60000)
countdown()

/* PARTICULAS */

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:2}
}
})

/* FONDO */

VANTA.WAVES({
el:"#vanta-bg",
color:0x1c3c6e,
waveHeight:18,
waveSpeed:0.7
})

/* FRASE BIBLICA */

let verses=[
"Todo lo puedo en aquel que me fortalece. Filipenses 4:13",
"El Señor es mi pastor; nada me faltará. Salmo 23:1",
"Confía en el Señor con todo tu corazón. Proverbios 3:5"
]

document.getElementById("verse").innerText=
verses[Math.floor(Math.random()*verses.length)]

/* AVISOS GOOGLE SHEETS */

async function avisos(){

let url="https://docs.google.com/spreadsheets/d/e/2PACX-1vQAwFHzlnoaHhvSuA5P8F9alWHymsSo870bkagSe0AxvejhnoHMkYFudw4FHBpFYmOwSI_aRl2OGLWX/pub?gid=0&single=true&output=csv"

let text=await fetch(url).then(r=>r.text())

let lines=text.split("\n")

let html=""

lines.forEach(l=>{
if(l.trim()!="") html+=`<div class="notice">${l}</div>`
})

document.getElementById("avisos").innerHTML=html

}

avisos()
setInterval(avisos,30000)

/* VIDEO CADA 5 MIN */

let video=document.getElementById("videoPlayer")
let overlay=document.getElementById("videoOverlay")

setInterval(()=>{

overlay.style.display="flex"
overlay.style.opacity=0

let fade=setInterval(()=>{

overlay.style.opacity=parseFloat(overlay.style.opacity)+0.05

if(overlay.style.opacity>=1) clearInterval(fade)

},50)

video.play()

video.onended=()=>{
overlay.style.display="none"
}

},300000)

</script>

</body>
</html>
