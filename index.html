<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#1f3c88,#0f1f4d);
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

/* PARTICULAS */

#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-10;
}

/* TITULO */

.titulo{
font-size:42px;
margin-top:10px;

background:linear-gradient(90deg,#FFD700,#fff4b0,#FFD700);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:brillo 6s linear infinite;

text-align:center;
}

@keyframes brillo{
0%{background-position:0%}
100%{background-position:200%}
}

/* BARRA */

.barra-contenedor{
width:70%;
height:34px;
background:rgba(255,255,255,.25);
border-radius:30px;
overflow:hidden;
margin-top:10px;
}

.barra-progreso{
height:100%;
width:0%;

background:linear-gradient(90deg,#ffd000,#ffae00,#ffd000);

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
color:#1a1a1a;

transition:width 1s ease;
font-size:15px;
}

/* SALUDO */

#saludo{
font-size:26px;
margin-top:6px;
animation:fadeSaludo 3s infinite alternate;
}

@keyframes fadeSaludo{
from{opacity:.5; transform:scale(.95)}
to{opacity:1; transform:scale(1)}
}

#hora{
font-size:20px;
opacity:.9;
margin-bottom:10px;
}

/* CONTADOR */

.contenedor{
display:flex;
gap:16px;
}

.caja{
background:rgba(20,30,60,.95);
padding:18px;
border-radius:16px;
min-width:100px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.6);
}

.numero{
font-size:40px;
font-weight:bold;
color:#FFD700;
text-shadow:0 4px 10px rgba(0,0,0,.6);
}

.caja div:last-child{
font-size:13px;
margin-top:4px;
}

/* CLIMA */

.clima{
position:absolute;
left:20px;
top:230px;

width:220px;

background:linear-gradient(180deg,#2193b0,#6dd5ed);

border-radius:18px;
padding:15px;

box-shadow:0 15px 35px rgba(0,0,0,.6);
}

.temp{
font-size:42px;
}

/* CARRUSEL */

.carrusel{
position:relative;
width:60%;
height:250px;

margin-top:15px;

border-radius:20px;
overflow:hidden;

box-shadow:0 20px 40px rgba(0,0,0,.7);

z-index:5;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1.5s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.activo{
opacity:1;
}

/* FRASE */

.versiculo{
margin-top:10px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:15px;
width:60%;
text-align:center;
}

/* VIDEO */

.videoFull{
position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:black;

display:flex;
align-items:center;
justify-content:center;

opacity:0;
pointer-events:none;

transition:opacity 2s ease;

z-index:50;
}

.videoFull.activo{
opacity:1;
pointer-events:auto;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

</style>
